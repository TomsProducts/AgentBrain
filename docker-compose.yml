version: '3.9'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - claude-store:/claude-store
    environment:
      SPRING_PROFILES_ACTIVE: dev
      AGENTBRAIN_CLAUDE_DIR: /claude-store
      SYNC_TOKEN: ${SYNC_TOKEN:-dev-token-change-me}
      JWT_SECRET: ${JWT_SECRET:-nexlayer-shared-sso-secret-change-in-production-64chars!!}
      IDENTITY_SERVER_URL: ${IDENTITY_SERVER_URL:-http://192.168.68.111:3007}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  claude-store:
