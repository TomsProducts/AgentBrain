<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#818cf8;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#c084fc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="0.5">
    <line x1="0" y1="56" x2="1200" y2="56"/>
    <line x1="0" y1="112" x2="1200" y2="112"/>
    <line x1="0" y1="168" x2="1200" y2="168"/>
    <line x1="0" y1="224" x2="1200" y2="224"/>
    <line x1="150" y1="0" x2="150" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="450" y1="0" x2="450" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="750" y1="0" x2="750" y2="280"/>
    <line x1="900" y1="0" x2="900" y2="280"/>
    <line x1="1050" y1="0" x2="1050" y2="280"/>
  </g>

  <!-- Glowing orbs -->
  <circle cx="200" cy="140" r="120" fill="#6366f1" opacity="0.06" filter="url(#softglow)"/>
  <circle cx="1000" cy="140" r="100" fill="#a855f7" opacity="0.06" filter="url(#softglow)"/>
  <circle cx="600" cy="60" r="80" fill="#38bdf8" opacity="0.04" filter="url(#softglow)"/>

  <!-- Brain icon (simplified neural network) -->
  <g transform="translate(118, 100)" opacity="0.9" filter="url(#glow)">
    <!-- Nodes -->
    <circle cx="0"   cy="40"  r="6" fill="#818cf8"/>
    <circle cx="40"  cy="10"  r="6" fill="#a78bfa"/>
    <circle cx="40"  cy="70"  r="6" fill="#a78bfa"/>
    <circle cx="80"  cy="0"   r="6" fill="#c084fc"/>
    <circle cx="80"  cy="40"  r="6" fill="#c084fc"/>
    <circle cx="80"  cy="80"  r="6" fill="#c084fc"/>
    <circle cx="120" cy="20"  r="6" fill="#e879f9"/>
    <circle cx="120" cy="60"  r="6" fill="#e879f9"/>
    <!-- Connections -->
    <g stroke="#818cf8" stroke-width="1.5" opacity="0.5">
      <line x1="0"  y1="40" x2="40" y2="10"/>
      <line x1="0"  y1="40" x2="40" y2="70"/>
      <line x1="40" y1="10" x2="80" y2="0"/>
      <line x1="40" y1="10" x2="80" y2="40"/>
      <line x1="40" y1="70" x2="80" y2="40"/>
      <line x1="40" y1="70" x2="80" y2="80"/>
      <line x1="80" y1="0"  x2="120" y2="20"/>
      <line x1="80" y1="40" x2="120" y2="20"/>
      <line x1="80" y1="40" x2="120" y2="60"/>
      <line x1="80" y1="80" x2="120" y2="60"/>
    </g>
  </g>

  <!-- Main title -->
  <text x="600" y="128"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="72"
        font-weight="800"
        letter-spacing="-2"
        text-anchor="middle"
        fill="url(#titleGrad)"
        filter="url(#glow)">AgentBrain</text>

  <!-- Divider line -->
  <rect x="300" y="148" width="600" height="1.5" fill="url(#lineGrad)" rx="1"/>

  <!-- Subtitle -->
  <text x="600" y="186"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22"
        font-weight="400"
        letter-spacing="0.5"
        text-anchor="middle"
        fill="#94a3b8">Persistent memory &amp; config management for AI coding agents</text>

  <!-- Pill tags -->
  <g transform="translate(600, 220)" text-anchor="middle">
    <!-- Self-hosted pill -->
    <rect x="-290" y="0" width="110" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="-235" y="19" font-family="monospace" font-size="12" fill="#94a3b8">🏠 self-hosted</text>

    <!-- Spring Boot pill -->
    <rect x="-165" y="0" width="120" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="-105" y="19" font-family="monospace" font-size="12" fill="#94a3b8">☕ Spring Boot 3</text>

    <!-- React pill -->
    <rect x="-30" y="0" width="90" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="15" y="19" font-family="monospace" font-size="12" fill="#94a3b8">⚛ React 18</text>

    <!-- Docker pill -->
    <rect x="75" y="0" width="100" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="125" y="19" font-family="monospace" font-size="12" fill="#94a3b8">🐳 Docker</text>

    <!-- Dream cycle pill -->
    <rect x="190" y="0" width="110" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="245" y="19" font-family="monospace" font-size="12" fill="#94a3b8">🌙 Dream Cycle</text>
  </g>
</svg>
